<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f19"/>
      <stop offset="50%" stop-color="#141a2e"/>
      <stop offset="100%" stop-color="#1a2240"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(99,102,241,0.12)"/>
      <stop offset="100%" stop-color="rgba(6,182,212,0.06)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- subtle grid -->
  <g opacity="0.03" stroke="#6366f1" stroke-width="0.5">
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="360" x2="1200" y2="360"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="300" y1="0" x2="300" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- logo mark -->
  <g transform="translate(48,36)">
    <circle cx="0" cy="0" r="28" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.9"/>
    <text x="0" y="8" font-family="system-ui,sans-serif" font-size="28" font-weight="700" fill="url(#accent)" text-anchor="middle">μ</text>
    <text x="42" y="10" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#e2e8f0">Mneme</text>
    <text x="160" y="10" font-family="system-ui,sans-serif" font-size="12" fill="#64748b" font-weight="400">AGENT COGNITION RUNTIME</text>
  </g>

  <!-- main headline -->
  <text x="48" y="210" font-family="system-ui,sans-serif" font-size="48" font-weight="800" fill="#f8fafc" letter-spacing="-1">
    Give Your AI Agent
  </text>
  <text x="48" y="270" font-family="system-ui,sans-serif" font-size="48" font-weight="800" fill="url(#accent)" letter-spacing="-1" filter="url(#glow)">
    Long-Term Memory
  </text>

  <!-- subtitle -->
  <text x="48" y="318" font-family="system-ui,sans-serif" font-size="20" fill="#94a3b8" font-weight="400">
    Mneme remembers what your agent did, decided, and learned —<tspan x="48" dy="28">so every session starts with context, not prompts.</tspan>
  </text>

  <!-- feature cards row -->
  <g transform="translate(48, 378)">
    <!-- card 1 -->
    <rect x="0" y="0" width="340" height="100" rx="10" fill="url(#cardGrad)" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
    <text x="20" y="34" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#818cf8">14 Memory Types</text>
    <text x="20" y="56" font-family="system-ui,sans-serif" font-size="13" fill="#cbd5e1">
      event ・ knowledge ・ experience ・<tspan x="20" dy="18">simulation ・ decision ・ constraint ・ belief …</tspan>
    </text>
    <!-- card 2 -->
    <rect x="364" y="0" width="340" height="100" rx="10" fill="url(#cardGrad)" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
    <text x="384" y="34" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#818cf8">4 Protocols ・ 3 SDKs</text>
    <text x="384" y="56" font-family="system-ui,sans-serif" font-size="13" fill="#cbd5e1">
      MCP ・ JSON-RPC ・ REST ・ gRPC<tspan x="384" dy="18">Python ・ TypeScript ・ Go ・ CLI</tspan>
    </text>
    <!-- card 3 -->
    <rect x="728" y="0" width="340" height="100" rx="10" fill="url(#cardGrad)" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
    <text x="748" y="34" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#818cf8">OpenCode ・ Claude Code ・ Codex</text>
    <text x="748" y="56" font-family="system-ui,sans-serif" font-size="13" fill="#cbd5e1">
      MCP server — drop-in, no config<tspan x="748" dy="18">Companion skill + examples included</tspan>
    </text>
  </g>

  <!-- bottom bar -->
  <rect x="0" y="540" width="1200" height="90" fill="rgba(99,102,241,0.05)"/>
  <text x="48" y="580" font-family="system-ui,sans-serif" font-size="16" fill="#06b6d4" font-weight="600">
    github.com/axisrobo/mneme-open
  </text>
  <text x="48" y="606" font-family="system-ui,sans-serif" font-size="12" fill="#475569">
    Apache-2.0 ・ Open Core ・ Prebuilt binaries for Windows / Linux / macOS
  </text>

  <!-- right-side abstract memory graph -->
  <g transform="translate(900,120)" opacity="0.6">
    <circle cx="160" cy="20" r="6" fill="#6366f1"/>
    <circle cx="200" cy="60" r="6" fill="#06b6d4"/>
    <circle cx="240" cy="20" r="6" fill="#818cf8"/>
    <circle cx="120" cy="80" r="6" fill="#a78bfa"/>
    <circle cx="180" cy="120" r="6" fill="#6366f1"/>
    <circle cx="240" cy="140" r="6" fill="#06b6d4"/>
    <circle cx="200" cy="200" r="6" fill="#818cf8"/>
    <circle cx="80" cy="160" r="6" fill="#a78bfa"/>
    <line x1="160" y1="20" x2="200" y2="60" stroke="#6366f1" stroke-width="0.8"/>
    <line x1="200" y1="60" x2="240" y2="20" stroke="#06b6d4" stroke-width="0.8"/>
    <line x1="200" y1="60" x2="180" y2="120" stroke="#818cf8" stroke-width="0.8"/>
    <line x1="240" y1="20" x2="240" y2="140" stroke="#6366f1" stroke-width="0.8"/>
    <line x1="180" y1="120" x2="200" y2="200" stroke="#06b6d4" stroke-width="0.8"/>
    <line x1="180" y1="120" x2="240" y2="140" stroke="#a78bfa" stroke-width="0.8"/>
    <line x1="120" y1="80" x2="180" y2="120" stroke="#818cf8" stroke-width="0.8"/>
    <line x1="120" y1="80" x2="80" y2="160" stroke="#6366f1" stroke-width="0.8"/>
  </g>
</svg>
