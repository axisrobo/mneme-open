syntax = "proto3";

package mneme.v1;

option go_package = "github.com/axisrobo/mneme/go/api/mneme/v1;Mnemev1";

// Mneme is the core memory閳ユ唭peration service.  Every method corresponds to a
// stable operation in the mneme.memory.v1閳ユ吀raft contract.

service Mneme {
  // 閳光偓閳光偓 typed writes 閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓
  rpc CommitMemory   (CommitMemoryRequest)   returns (CommitMemoryResponse);
  rpc AddEpisode     (AddEpisodeRequest)     returns (AddEpisodeResponse);
  rpc AddFact        (AddFactRequest)        returns (AddFactResponse);
  rpc InvalidateFact (InvalidateFactRequest) returns (InvalidateFactResponse);
  rpc UpsertSubject  (UpsertSubjectRequest)  returns (UpsertSubjectResponse);
  rpc UpsertEntity   (UpsertEntityRequest)   returns (UpsertEntityResponse);

  // 閳光偓閳光偓 queries 閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓
  rpc SearchMemory   (SearchMemoryRequest)   returns (SearchMemoryResponse);
  rpc QueryMemories  (QueryMemoriesRequest)  returns (QueryMemoriesResponse);
  rpc QueryFacts     (QueryFactsRequest)     returns (QueryFactsResponse);

  // 閳光偓閳光偓 resolution 閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓
  rpc ResolveEntity          (ResolveEntityRequest)          returns (ResolveEntityResponse);
  rpc ResolveEntityExplained (ResolveEntityExplainedRequest) returns (ResolveEntityExplainedResponse);

  // 閳光偓閳光偓 extraction (Phase閳?) 閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓
  rpc ExtractEpisode (ExtractEpisodeRequest) returns (ExtractEpisodeResponse);

  // 閳光偓閳光偓 branching 閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓
  rpc CreateBranch  (CreateBranchRequest)  returns (CreateBranchResponse);
  rpc MergeBranch   (MergeBranchRequest)   returns (MergeBranchResponse);
  rpc ListBranches  (ListBranchesRequest)  returns (ListBranchesResponse);

  // 閳光偓閳光偓 maintenance (Phase閳?) 閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓
  rpc SetRetentionState  (SetRetentionStateRequest)  returns (SetRetentionStateResponse);
  rpc VerifyCommitIndex  (VerifyCommitIndexRequest)  returns (VerifyCommitIndexResponse);
}

// 閳光偓閳光偓 shared types 閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓

message Commit {
  int32           sequence            = 1;
  string          commit_id           = 2;
  string          branch_name         = 3;
  string          memory_type         = 4;
  string          retention_state     = 5;
  string          created_at          = 6;
  string          tenant_id           = 7;
  map<string, Value> payload          = 8;
  map<string, Value> metadata         = 9;
  repeated string parent_commit_ids   = 10;
  repeated EntityLink entity_links    = 11;
  repeated OntologyAssertion ontology_assertions = 12;
  string          owner_subject_id    = 13;
  string          project_id          = 14;
}

message EntityLink {
  string entity_id   = 1;
  string entity_role = 2;
  double confidence  = 3;
}

message OntologyAssertion {
  string entity_id    = 1;
  string predicate    = 2;
  string object_value = 3;
  double confidence   = 4;
}

message ExtractionRun {
  string          run_id              = 1;
  string          episode_commit_id   = 2;
  string          branch_name         = 3;
  string          provider_id         = 4;
  string          fingerprint         = 5;
  string          status              = 6;   // "extracted" | "quarantined"
  repeated string derived_commit_ids  = 7;
  string          error               = 8;   // only when quarantined
}

// google.protobuf.Value閳ユ唨ike wrapper for arbitrary JSON.
message Value {
  oneof kind {
    string string_value  = 1;
    double number_value  = 2;
    bool   bool_value    = 3;
    Struct struct_value  = 4;
    List   list_value    = 5;
  }
  message Struct { map<string, Value> fields = 1; }
  message List   { repeated Value values    = 1; }
}

// 閳光偓閳光偓 request / response messages 閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓

message CommitMemoryRequest {
  string          branch_name         = 1;
  string          memory_type         = 2;
  map<string, Value> payload          = 3;
  map<string, Value> metadata         = 4;
  string          owner_subject_id    = 5;
  string          tenant_id           = 6;
  repeated EntityLink entity_links    = 7;
  repeated OntologyAssertion ontology_assertions = 8;
  string          project_id          = 9;
  repeated string principal_subject_ids = 10;
  string          session_id          = 11;
}
message CommitMemoryResponse { Commit commit = 1; }

message AddEpisodeRequest {
  string          branch_name         = 1;
  string          content             = 2;
  string          episode_type        = 3;
  string          source              = 4;
  string          observed_at         = 5;
  string          tenant_id           = 6;
  string          project_id          = 7;
  repeated string principal_subject_ids = 8;
  string          session_id          = 9;
}
message AddEpisodeResponse { Commit commit = 1; }

message AddFactRequest {
  string          branch_name         = 1;
  string          fact_id             = 2;
  string          subject_id          = 3;
  string          predicate           = 4;
  string          object_value        = 5;
  string          valid_from          = 6;
  string          valid_to            = 7;
  double          confidence          = 8;
  string          tenant_id           = 9;
  repeated EntityLink entity_links    = 10;
  string          project_id          = 11;
  repeated string principal_subject_ids = 12;
  string          session_id          = 13;
}
message AddFactResponse { Commit commit = 1; }

message InvalidateFactRequest {
  string branch_name         = 1;
  string fact_id             = 2;
  string invalidated_at      = 3;
  string reason              = 4;
  string tenant_id           = 5;
  string project_id          = 6;
  repeated string principal_subject_ids = 7;
}
message InvalidateFactResponse { Commit commit = 1; }

message UpsertSubjectRequest {
  string subject_id   = 1;
  string subject_type = 2;
  string display_name = 3;
  string tenant_id    = 4;
  string project_id   = 5;
  repeated string principal_subject_ids = 6;
}
message UpsertSubjectResponse { string subject_id = 1; }

message UpsertEntityRequest {
  string          entity_id       = 1;
  string          entity_type     = 2;
  string          canonical_name  = 3;
  map<string, Value> metadata     = 4;
  string          tenant_id       = 5;
  string          project_id      = 6;
  repeated string principal_subject_ids = 7;
}
message UpsertEntityResponse { string entity_id = 1; }

message SearchMemoryRequest {
  string          branch_name = 1;
  string          query       = 2;
  int32           top_k       = 3;
  repeated string entity_ids  = 4;
  string          tenant_id   = 5;
  string          project_id  = 6;
  repeated string principal_subject_ids = 7;
}
message SearchMemoryResponse {
  repeated SearchResult results = 1;
  message SearchResult {
    Commit commit              = 1;
    double score               = 2;
    repeated string matched_modes = 3;
  }
}

message QueryMemoriesRequest {
  string          branch_name  = 1;
  repeated string entity_ids   = 2;
  int32           limit        = 3;
  string          tenant_id    = 4;
  string          project_id   = 5;
  repeated string principal_subject_ids = 6;
}
message QueryMemoriesResponse { repeated Commit commits = 1; }

message QueryFactsRequest {
  string branch_name         = 1;
  string fact_id             = 2;
  string subject_id          = 3;
  string predicate           = 4;
  string true_at             = 5;
  bool   include_invalidated = 6;
  int32  limit               = 7;
  string tenant_id           = 8;
  string project_id          = 9;
  repeated string principal_subject_ids = 10;
}
message QueryFactsResponse {
  repeated FactItem facts = 1;
  message FactItem {
    string fact_id          = 1;
    string subject_id       = 2;
    string predicate        = 3;
    string object_value     = 4;
    double confidence       = 5;
    string valid_from       = 6;
    string valid_to         = 7;
    string source_commit_id = 8;
    string branch_name      = 9;
  }
}

message ResolveEntityRequest {
  string mention     = 1;
  string entity_type = 2;
  string tenant_id   = 3;
  string project_id  = 4;
  repeated string principal_subject_ids = 5;
}
message ResolveEntityResponse {
  string entity_id      = 1;
  string entity_type    = 2;
  string canonical_name = 3;
}

message ResolveEntityExplainedRequest {
  string mention     = 1;
  string entity_type = 2;
  string tenant_id   = 3;
  string project_id  = 4;
  repeated string principal_subject_ids = 5;
}
message ResolveEntityExplainedResponse {
  bool   matched       = 1;
  string match_type    = 2;
  string matched_value = 3;
  double confidence    = 4;
  ResolveEntityResponse entity = 5;
}

message ExtractEpisodeRequest {
  string branch_name        = 1;
  string episode_commit_id  = 2;
  string provider           = 3;
  string tenant_id          = 4;
  string project_id         = 5;
  repeated string principal_subject_ids = 6;
}
message ExtractEpisodeResponse { ExtractionRun run = 1; }

message CreateBranchRequest {
  string branch_name = 1;
  string from_branch = 2;
  string tenant_id   = 3;
  string project_id  = 4;
  repeated string principal_subject_ids = 5;
}
message CreateBranchResponse {
  string branch_name        = 1;
  string parent_branch_name = 2;
  int32  head_sequence      = 3;
}

message MergeBranchRequest {
  string source_branch = 1;
  string target_branch = 2;
  string strategy      = 3;
  string tenant_id     = 4;
  string project_id    = 5;
  repeated string principal_subject_ids = 6;
}
message MergeBranchResponse { Commit commit = 1; }

message ListBranchesRequest {
  string tenant_id  = 1;
  string project_id = 2;
  repeated string principal_subject_ids = 3;
}
message ListBranchesResponse {
  repeated Branch branches = 1;
  message Branch {
    string branch_name         = 1;
    string parent_branch_name  = 2;
    int32  head_sequence       = 3;
    string head_commit_id      = 4;
  }
}

message SetRetentionStateRequest {
  string commit_id        = 1;
  string retention_state  = 2;
  string tenant_id        = 3;
  string project_id       = 4;
  repeated string principal_subject_ids = 5;
}
message SetRetentionStateResponse { Commit commit = 1; }

message VerifyCommitIndexRequest {
  string commit_id  = 1;
  string tenant_id  = 2;
  string project_id = 3;
  repeated string principal_subject_ids = 4;
}
message VerifyCommitIndexResponse {
  repeated IndexIssue issues = 1;
  message IndexIssue {
    string commit_id = 1;
    string kind      = 2;
    string detail    = 3;
  }
}
